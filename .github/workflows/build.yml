name: build

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: install.sh + test.sh + uninstall.sh
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dkms build-essential linux-headers-$(uname -r) eject
          chmod +x install.sh test.sh uninstall.sh
          sudo ./install.sh
          sudo ./test.sh | tee test.log
          grep -qE 'Result: [0-9]+ passed, 0 failed' test.log
          sudo ./uninstall.sh

  build:
    runs-on: ubuntu-latest
    name: ${{ matrix.name }}
    # Track future kernel API changes without making an explicitly
    # experimental matrix entry fail the supported-kernel build gate.
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 6.12 LTS
            pkgver: 6.12.1.arch1-1
            experimental: false
          - name: 6.19 supported
            pkgver: 6.19.13.arch1-1
            experimental: false
          - name: latest (experimental)
            pkgver: ""
            experimental: true
    steps:
      - uses: actions/checkout@v7
      - name: dkms build
        env:
          PKGVER: ${{ matrix.pkgver }}
        run: |
          docker run --rm -e PKGVER -v "$PWD:/src:ro" archlinux:latest bash -c '
            set -e
            pacman -Syu --noconfirm --needed base-devel bc kmod dkms curl
            if [ -n "$PKGVER" ]; then
              curl -fsSL -o /tmp/h.pkg.tar.zst \
                "https://archive.archlinux.org/packages/l/linux-headers/linux-headers-$PKGVER-x86_64.pkg.tar.zst"
              pacman -U --noconfirm /tmp/h.pkg.tar.zst
            else
              pacman -S --noconfirm linux-headers
            fi
            kver=$(ls -1 /usr/lib/modules | head -1)
            . /src/dkms.conf
            mkdir -p "/usr/src/$PACKAGE_NAME-$PACKAGE_VERSION"
            cp -a /src/. "/usr/src/$PACKAGE_NAME-$PACKAGE_VERSION/"
            dkms add   -m "$PACKAGE_NAME" -v "$PACKAGE_VERSION"
            dkms build -m "$PACKAGE_NAME" -v "$PACKAGE_VERSION" -k "$kver"
          '

  ubuntu-kernels:
    runs-on: ubuntu-latest
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 20.04 / 5.4 GA
            image: ubuntu:20.04
            headers: linux-headers-generic
            pattern: 5.4.0-*-generic
          - name: Ubuntu 22.04 / 5.15 GA
            image: ubuntu:22.04
            headers: linux-headers-generic
            pattern: 5.15.0-*-generic
          - name: Ubuntu 24.04 / 6.8 GA
            image: ubuntu:24.04
            headers: linux-headers-generic
            pattern: 6.8.0-*-generic
    steps:
      - uses: actions/checkout@v7
      - name: dkms build
        env:
          IMAGE: ${{ matrix.image }}
          HEADERS: ${{ matrix.headers }}
          KVER_PATTERN: ${{ matrix.pattern }}
        run: |
          docker run --rm \
            -e HEADERS -e KVER_PATTERN -v "$PWD:/src:ro" "$IMAGE" bash -c '
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
              build-essential dkms "$HEADERS"
            kver=$(find /lib/modules -mindepth 1 -maxdepth 1 -type d \
              -name "$KVER_PATTERN" -printf "%f\n" | sort -V | tail -1)
            test -n "$kver"
            test -e "/lib/modules/$kver/build/Makefile"
            . /src/dkms.conf
            mkdir -p "/usr/src/$PACKAGE_NAME-$PACKAGE_VERSION"
            cp -a /src/. "/usr/src/$PACKAGE_NAME-$PACKAGE_VERSION/"
            dkms add   -m "$PACKAGE_NAME" -v "$PACKAGE_VERSION"
            dkms build -m "$PACKAGE_NAME" -v "$PACKAGE_VERSION" -k "$kver"
          '
